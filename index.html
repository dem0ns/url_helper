<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Helper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button class="theme-toggle" id="themeToggle" title="切换夜间模式">🌙</button>
    <div class="container">
        <div class="header">
            <div class="header-top">
                <h1>URL Helper</h1>
                <div id="qrcode" class="qrcode-container"></div>
            </div>
        </div>
        <div class="url-input-section">
            <textarea class="url-input" id="urlInput" placeholder="请输入要解析的URL，例如：https://example.com/path?param1=value1&param2=value2" rows="3"></textarea>
        </div>
        <div class="params-section">
            <div id="paramsList" class="params-list"></div>
            <div class="add-param-section">
                <div class="add-param-form">
                    <input type="text" class="add-param-input" id="newParamName" placeholder="参数名">
                    <input type="text" class="add-param-input" id="newParamValue" placeholder="参数值">
                    <button class="param-btn add-btn" onclick="addNewParam()">添加参数</button>
                </div>
            </div>
        </div>
        <div class="replace-section">
            <input type="text" class="replace-input" id="replaceFrom" placeholder="要替换的内容">
            <input type="text" class="replace-input" id="replaceTo" placeholder="替换为">
            <button class="action-btn" id="replaceBtn">批量替换参数值</button>
        </div>
    </div>
    <div class="floating-buttons">
        <button class="floating-btn" id="clearUrlBtn" title="清空">🗑️</button>
        <button class="floating-btn" id="copyUrlBtn" title="一键复制">📋</button>
        <button class="floating-btn primary" id="openUrlBtn" title="一键打开URL">🔗</button>
    </div>
    <div id="qrcodeModal" class="qrcode-modal">
        <div class="qrcode-modal-content">
            <button class="qrcode-modal-close" id="qrcodeModalClose">&times;</button>
            <div id="qrcodeLarge"></div>
        </div>
    </div>
    <footer class="footer">
        <a href="https://github.com/dem0ns/url_helper" target="_blank">GitHub</a>
    </footer>
    <script src="qrcode.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
